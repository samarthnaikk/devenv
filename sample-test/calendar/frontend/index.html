<html lang="en">

    <link rel="stylesheet" href="style.css">

<body>
    <div class="calendar"></div>
    <script src="script.js"></script>
<script>const days = 30;const calendarElement = document.getElementById('calendar');for (let i = 1; i <= days; i++) {const dayElement = document.createElement('div');dayElement.textContent = i;calendarElement.appendChild(dayElement);}</script>
